<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yêu cầu - Bạn đọc</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome (Icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
    </style>
</head>
<body>
    <div class="container my-5">
        <div class="row">
            <!-- Sidebar Menu -->
            <div class="col-md-3">
                <div class="card border-0 shadow-sm p-3">
                    <div class="text-center mb-4">
                        <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-2" style="width: 60px; height: 60px;">
                            <i class="fas fa-user fa-2x"></i>
                        </div>
                        <h6 class="fw-bold mb-0">Nguyễn Mai Minh Quý</h6>
                        <small class="text-success">Thẻ bạn đọc: Đang hoạt động</small>
                    </div>
                    <div class="list-group list-group-flush">
                        <a href="reader-dashboard.html" class="list-group-item list-group-item-action border-0 rounded mb-1">Đang mượn</a>
                        <a href="borrow-history.html" class="list-group-item list-group-item-action border-0 rounded mb-1">Lịch sử mượn trả</a>
                        <a href="my-requests.html" class="list-group-item list-group-item-action border-0 active rounded mb-1">Yêu cầu</a>
                        <a href="profile.html" class="list-group-item list-group-item-action border-0 rounded mb-1">Thông tin cá nhân</a>
                        <a href="#" class="list-group-item list-group-item-action border-0 rounded text-danger">Đăng xuất</a>
                    </div>
                </div>
            </div>

            <!-- Main Content -->
            <div class="col-md-9">
                <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2 mb-3">
                    <div>
                        <h4 class="fw-bold mb-1">Yêu cầu của tôi</h4>
                        <div class="text-muted small">Theo dõi trạng thái các yêu cầu đã gửi.</div>
                    </div>
                    <select id="typeFilter" class="form-select form-select-sm" style="max-width: 220px;">
                        <option value="">Tất cả loại yêu cầu</option>
                        <option value="register-card">Đăng ký thẻ bạn đọc</option>
                        <option value="borrow">Mượn sách</option>
                        <option value="renew-book">Gia hạn sách</option>
                        <option value="renew-card">Gia hạn thẻ bạn đọc</option>
                    </select>
                </div>

                <div class="card border-0 shadow-sm overflow-hidden">
                    <div class="table-responsive">
                        <table class="table mb-0 align-middle">
                            <thead class="bg-light">
                                <tr>
                                    <th class="ps-3">Loại yêu cầu</th>
                                    <th>Chi tiết</th>
                                    <th>Ngày gửi</th>
                                    <th>Trạng thái</th>
                                </tr>
                            </thead>
                            <tbody id="requestsTbody"></tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const requests = [
            {
                type: "register-card",
                typeLabel: "Đăng ký thẻ bạn đọc",
                detail: "Quý Nguyễn (MSSV: 2026XXXX)",
                sentAt: "2026-05-01",
                status: "pending",
                statusLabel: "Chờ duyệt"
            },
            {
                type: "borrow",
                typeLabel: "Mượn sách",
                detail: "Cấu trúc dữ liệu & Giải thuật",
                sentAt: "2026-05-03",
                status: "approved",
                statusLabel: "Đã duyệt"
            },
            {
                type: "renew-book",
                typeLabel: "Gia hạn sách",
                detail: "Lập trình Node.js nâng cao (gia hạn đến 2026-05-25)",
                sentAt: "2026-04-28",
                status: "approved",
                statusLabel: "Đã duyệt"
            },
            {
                type: "renew-card",
                typeLabel: "Gia hạn thẻ bạn đọc",
                detail: "Thẻ bạn đọc (gia hạn đến 2026-12-31)",
                sentAt: "2026-04-20",
                status: "rejected",
                statusLabel: "Từ chối"
            },
            {
                type: "borrow",
                typeLabel: "Mượn sách",
                detail: "Nhập môn Trí tuệ nhân tạo",
                sentAt: "2026-05-04",
                status: "pending",
                statusLabel: "Chờ duyệt"
            }
        ];

        const tbody = document.getElementById("requestsTbody");
        const typeFilter = document.getElementById("typeFilter");

        const toVN = (iso) => {
            if (!iso) return "—";
            const [y, m, d] = iso.split("-");
            return `${d}/${m}/${y}`;
        };

        const statusBadgeHtml = (status) => {
            if (status === "pending") return '<span class="badge bg-warning text-dark">Chờ duyệt</span>';
            if (status === "approved") return '<span class="badge bg-success">Đã duyệt</span>';
            if (status === "rejected") return '<span class="badge bg-danger">Từ chối</span>';
            return '<span class="badge bg-secondary">Không rõ</span>';
        };

        const render = () => {
            const type = typeFilter.value;

            const filtered = type
                ? requests.filter(req => req.type === type)
                : requests;

            if (filtered.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="4" class="text-center text-muted py-4">Không có yêu cầu nào.</td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = filtered.map(req => `
                <tr>
                    <td class="ps-3 fw-medium">${req.typeLabel}</td>
                    <td class="text-muted small">${req.detail}</td>
                    <td>${toVN(req.sentAt)}</td>
                    <td>${statusBadgeHtml(req.status)}</td>
                </tr>
            `).join("");
        };

        typeFilter.addEventListener("change", render);

        render();
    </script>
</body>
</html>
