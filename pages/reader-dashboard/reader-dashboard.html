<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thư Viện Số</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome (Icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .navbar { box-shadow: 0 2px 4px rgba(0,0,0,.08); }
        .hero-section {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            color: white;
            padding: 100px 0;
        }
        .search-box {
            background: white;
            padding: 20px;
            border-radius: 50px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .book-card {
            transition: transform 0.3s;
            border: none;
            box-shadow: 0 4px 6px rgba(0,0,0,.05);
        }
        .book-card:hover { transform: translateY(-10px); }
        .badge-available { background-color: #28a745; }
        .badge-borrowed { background-color: #dc3545; }
        footer { background-color: #212529; color: white; padding: 40px 0; }
    </style>
</head>
<body>
    <!-- Một phần giao diện Dashboard Bạn đọc -->
<div class="container my-5">
    <div class="row">
        <!-- Sidebar Menu -->
        <div class="col-md-3">
            <div class="card border-0 shadow-sm p-3">
                <div class="text-center mb-4">
                    <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-2" style="width: 60px; height: 60px;">
                        <i class="fas fa-user fa-2x"></i>
                    </div>
                    <h6 class="fw-bold mb-0">Nguyễn Mai Minh Quý</h6>
                    <small class="text-success">Thẻ bạn đọc: Đang hoạt động</small>
                </div>
                <div class="list-group list-group-flush">
                    <a href="#" class="list-group-item list-group-item-action border-0 active rounded mb-1">Đang mượn</a>
                    <a href="#" class="list-group-item list-group-item-action border-0 rounded mb-1">Lịch sử mượn trả</a>
                    <a href="#" class="list-group-item list-group-item-action border-0 rounded mb-1">Yêu cầu đăng ký thẻ</a>
                    <a href="#" class="list-group-item list-group-item-action border-0 rounded text-danger">Đăng xuất</a>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="col-md-9">
            <h4 class="fw-bold mb-4">Sách đang mượn</h4>
            <div class="card border-0 shadow-sm overflow-hidden">
                <table class="table mb-0 align-middle">
                    <thead class="bg-light">
                        <tr>
                            <th class="ps-3">Tên sách</th>
                            <th>Ngày mượn</th>
                            <th>Hạn trả</th>
                            <th>Trạng thái</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="ps-3 fw-medium text-primary">Cấu trúc dữ liệu & Giải thuật</td>
                            <td>01/05/2026</td>
                            <td>15/05/2026</td>
                            <td><span class="badge bg-warning text-dark">Còn 11 ngày</span></td>
                            <td><button class="btn btn-sm btn-link text-decoration-none">Gia hạn</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
