<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử mượn trả - Bạn đọc</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome (Icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
    </style>
</head>
<body>
    <div class="container my-5">
        <div class="row">
            <!-- Sidebar Menu -->
            <div class="col-md-3">
                <div class="card border-0 shadow-sm p-3">
                    <div class="text-center mb-4">
                        <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-2" style="width: 60px; height: 60px;">
                            <i class="fas fa-user fa-2x"></i>
                        </div>
                        <h6 class="fw-bold mb-0">Nguyễn Mai Minh Quý</h6>
                        <small class="text-success">Thẻ bạn đọc: Đang hoạt động</small>
                    </div>
                    <div class="list-group list-group-flush">
                        <a href="reader-dashboard.html" class="list-group-item list-group-item-action border-0 rounded mb-1">Đang mượn</a>
                        <a href="borrow-history.html" class="list-group-item list-group-item-action border-0 active rounded mb-1">Lịch sử mượn trả</a>
                        <a href="my-requests.html" class="list-group-item list-group-item-action border-0 rounded mb-1">Yêu cầu</a>
                        <a href="profile.html" class="list-group-item list-group-item-action border-0 rounded mb-1">Thông tin cá nhân</a>
                        <a href="#" class="list-group-item list-group-item-action border-0 rounded text-danger">Đăng xuất</a>
                    </div>
                </div>
            </div>

            <!-- Main Content -->
            <div class="col-md-9">
                <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2 mb-3">
                    <div>
                        <h4 class="fw-bold mb-1">Lịch sử mượn trả</h4>
                        <div class="text-muted small">Theo dõi các lần mượn, trả và trạng thái xử lý.</div>
                    </div>
                    <div class="d-flex gap-2">
                        <div class="input-group input-group-sm" style="max-width: 320px;">
                            <span class="input-group-text bg-white"><i class="fas fa-search text-muted"></i></span>
                            <input type="text" id="searchInput" class="form-control" placeholder="Tìm theo tên sách...">
                        </div>
                        <select id="statusFilter" class="form-select form-select-sm" style="max-width: 180px;">
                            <option value="">Tất cả trạng thái</option>
                            <option value="returned">Đã trả</option>
                            <option value="borrowing">Đang mượn</option>
                            <option value="overdue">Quá hạn</option>
                        </select>
                    </div>
                </div>

                <div class="card border-0 shadow-sm overflow-hidden">
                    <div class="table-responsive">
                        <table class="table mb-0 align-middle">
                            <thead class="bg-light">
                                <tr>
                                    <th class="ps-3">Tên sách</th>
                                    <th>Ngày mượn</th>
                                    <th>Hạn trả</th>
                                    <th>Ngày trả</th>
                                    <th>Trạng thái</th>
                                </tr>
                            </thead>
                            <tbody id="historyTbody"></tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const history = [
            {
                title: "Cấu trúc dữ liệu & Giải thuật",
                borrowedAt: "2026-05-01",
                dueAt: "2026-05-15",
                returnedAt: null,
                status: "borrowing"
            },
            {
                title: "Lập trình Node.js nâng cao",
                borrowedAt: "2026-04-10",
                dueAt: "2026-04-24",
                returnedAt: "2026-04-22",
                status: "returned"
            },
            {
                title: "Nhập môn Trí tuệ nhân tạo",
                borrowedAt: "2026-03-01",
                dueAt: "2026-03-15",
                returnedAt: "2026-03-20",
                status: "overdue",
                note: "đã trả trễ"
            }
        ];

        const tbody = document.getElementById("historyTbody");
        const searchInput = document.getElementById("searchInput");
        const statusFilter = document.getElementById("statusFilter");

        const toVN = (iso) => {
            if (!iso) return "—";
            const [y, m, d] = iso.split("-");
            return `${d}/${m}/${y}`;
        };

        const statusBadgeHtml = (item) => {
            if (item.status === "returned") return '<span class="badge bg-success">Đã trả</span>';
            if (item.status === "borrowing") return '<span class="badge bg-info">Đang mượn</span>';
            if (item.status === "overdue") {
                const note = item.note ? `<span class="text-muted small ms-2">(${item.note})</span>` : "";
                return `<span class="badge bg-danger">Quá hạn</span>${note}`;
            }
            return '<span class="badge bg-secondary">Không rõ</span>';
        };

        const render = () => {
            const q = searchInput.value.trim().toLowerCase();
            const st = statusFilter.value;

            const filtered = history.filter(item => {
                const matchQ = !q || item.title.toLowerCase().includes(q);
                const matchSt = !st || item.status === st;
                return matchQ && matchSt;
            });

            if (filtered.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" class="text-center text-muted py-4">Không có kết quả phù hợp.</td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = filtered.map(item => `
                <tr>
                    <td class="ps-3 fw-medium text-primary">${item.title}</td>
                    <td>${toVN(item.borrowedAt)}</td>
                    <td>${toVN(item.dueAt)}</td>
                    <td class="${item.returnedAt ? "" : "text-muted"}">${toVN(item.returnedAt)}</td>
                    <td>${statusBadgeHtml(item)}</td>
                </tr>
            `).join("");
        };

        searchInput.addEventListener("input", render);
        statusFilter.addEventListener("change", render);

        render();
    </script>
</body>
</html>
